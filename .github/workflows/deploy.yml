name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @workspace/eos-website run build
        env:
          PORT: 3000
          BASE_PATH: /
          BASE_URL: https://eos.iti.gr
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/eos-website/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-failure:
    # Runs whenever the build or deploy job fails.
    # Required secret: SLACK_WEBHOOK_URL
    #   Add it at: GitHub repo → Settings → Secrets and variables → Actions
    #   Create an Incoming Webhook at: https://api.slack.com/messaging/webhooks
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Send Slack notification
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":rotating_light: *EOS deployment failed*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":rotating_light: EOS deployment failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run logs>"
                  }
                }
              ]
            }

      - name: Open a GitHub Issue as a tracking record
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 7);
            const ref = context.ref.replace('refs/heads/', '');
            const date = new Date().toISOString().replace('T', ' ').substring(0, 16) + ' UTC';

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'deployment-failure',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title.includes(shortSha));
            if (duplicate) {
              console.log(`Tracking issue already open: #${duplicate.number}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: `Deployment failed — ${shortSha} on ${ref}`,
              body: [
                '## Deployment Failure',
                '',
                `**Date:** ${date}`,
                `**Branch:** \`${ref}\``,
                `**Commit:** [\`${shortSha}\`](https://github.com/${owner}/${repo}/commit/${context.sha})`,
                `**Workflow run:** [View logs](${runUrl})`,
                '',
                '### Next steps',
                '1. Check the workflow logs linked above to identify the failing step.',
                '2. Fix the issue and push a new commit, or re-run the workflow manually.',
                '3. Close this issue once the deployment is confirmed healthy.',
              ].join('\n'),
              labels: ['deployment-failure'],
            });
