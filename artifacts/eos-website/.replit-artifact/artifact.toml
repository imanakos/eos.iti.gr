kind = "web"
previewPath = "/"
title = "EOS - Earth Observation Services"
version = "1.0.0"
id = "artifacts/eos-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20507
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/eos-website run dev"

[services.env]
PORT = "20507"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/eos-website", "run", "build"]
publicDir = "artifacts/eos-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
